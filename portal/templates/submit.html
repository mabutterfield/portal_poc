<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting...</title>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    .connecting-card {
      text-align: center;
      padding: 2rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.25rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h5 {
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    p {
      font-size: 0.9rem;
      opacity: 0.7;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="connecting-card">
    <div class="spinner"></div>
    <h5>Connecting, {{ display_name }}…</h5>
    <p>Activating your {{ group }} access.</p>
  </div>

  <!--
    This form is submitted automatically by JavaScript.
    It POSTs the magic token + service credentials directly to FortiGate's
    fgtauth endpoint from the client's browser.

    The client is already on FortiGate's network segment, so it can reach
    the fgtauth URL. FortiGate validates the credentials against FreeRADIUS,
    receives the Fortinet-Group-Name VSA, assigns the policy group,
    and redirects the client to their original destination.
  -->
  <form method="POST" action="{{ post_url }}" id="fgtform">
    <input type="hidden" name="magic"    value="{{ magic }}">
    <input type="hidden" name="username" value="{{ username }}">
    <input type="hidden" name="password" value="{{ password }}">
  </form>

  <script>
    // Small delay so the spinner is visible before the browser navigates away
    setTimeout(function () {
      document.getElementById('fgtform').submit();
    }, 600);
  </script>

</body>
</html>
