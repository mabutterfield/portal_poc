#
# FreeRADIUS clients.conf
#
# Defines which hosts are allowed to send RADIUS requests to this server.
# The FortiGate acts as the RADIUS client (NAS).
#
# %%SHARED_SECRET%% and %%FORTIGATE_IP%% are substituted at container
# startup from environment variables via entrypoint.sh.
#

client fortigate {
    ipaddr                        = %%FORTIGATE_IP%%
    secret                        = %%SHARED_SECRET%%
    nas_type                      = other
    shortname                     = fortigate
    require_message_authenticator = true
}
