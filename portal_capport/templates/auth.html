<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAPPORT WiFi Access</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0d3b38 0%, #0d5c55 50%, #0a7c6e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .portal-card {
      background: #fff;
      border-radius: 14px;
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
    }

    .portal-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .wifi-icon { font-size: 2.8rem; line-height: 1; }

    .portal-header h5 {
      margin-top: 0.75rem;
      font-weight: 700;
      color: #0d5c55;
    }

    .portal-header .flow-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #e0f5f3;
      color: #0a7c6e;
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      margin-top: 0.3rem;
    }

    .form-label { font-weight: 600; font-size: 0.9rem; color: #333; }

    .form-control {
      border-radius: 8px;
      border: 1.5px solid #ddd;
      padding: 0.6rem 0.9rem;
      font-size: 0.95rem;
    }

    .form-control:focus {
      border-color: #0a7c6e;
      box-shadow: 0 0 0 3px rgba(10, 124, 110, 0.12);
    }

    .tier-card {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.65rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: block;
      user-select: none;
    }

    .tier-card:hover       { border-color: #80ccc5; background: #f5fffe; }
    .tier-card.selected    { border-color: #0a7c6e; background: #f0faf9; }
    .tier-card input[type="radio"] { display: none; }

    .tier-icon { font-size: 1.5rem; width: 2rem; text-align: center; flex-shrink: 0; }
    .tier-name { font-weight: 700; font-size: 0.95rem; color: #1a1a2e; }
    .tier-desc { font-size: 0.8rem; color: #666; margin-top: 0.1rem; }

    #guest-fields {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      max-height: 0;
      opacity: 0;
    }

    #guest-fields.visible { max-height: 200px; opacity: 1; }

    .eula-row {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
    }

    .eula-row input[type="checkbox"] {
      margin-top: 3px;
      flex-shrink: 0;
      width: 1.1rem;
      height: 1.1rem;
      accent-color: #0a7c6e;
      cursor: pointer;
    }

    .eula-row label { font-size: 0.85rem; color: #555; cursor: pointer; }
    .eula-row a { color: #0a7c6e; }

    .btn-connect {
      background: #0a7c6e;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-connect:hover:not(:disabled) { background: #0d5c55; }
    .btn-connect:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="portal-card">

    <div class="portal-header">
      <div class="wifi-icon">📶</div>
      <h5>Guest WiFi Access</h5>
      <div class="flow-badge">CAPPORT · RFC 8910</div>
    </div>

    {% if error %}
      <div class="alert alert-danger py-2 mb-3" style="font-size:0.88rem; border-radius:8px;">
        {{ error }}
      </div>
    {% endif %}

    <form method="POST" action="/auth" id="portal-form">

      <div class="mb-3">
        <label class="form-label">Access Type</label>

        <label class="tier-card" id="card-public">
          <input type="radio" name="group" value="public"
                 {% if request.form.get('group', 'public') == 'public' %}checked{% endif %}>
          <div class="d-flex align-items-center gap-3">
            <div class="tier-icon">🌍</div>
            <div>
              <div class="tier-name">Public</div>
              <div class="tier-desc">Lobby &amp; visitors · no room required · 2 hours</div>
            </div>
          </div>
        </label>

        <label class="tier-card" id="card-free">
          <input type="radio" name="group" value="free"
                 {% if request.form.get('group') == 'free' %}checked{% endif %}>
          <div class="d-flex align-items-center gap-3">
            <div class="tier-icon">🌐</div>
            <div>
              <div class="tier-name">Hotel Guest</div>
              <div class="tier-desc">Standard access · complimentary · 4 hours</div>
            </div>
          </div>
        </label>

        <label class="tier-card" id="card-premium">
          <input type="radio" name="group" value="premium"
                 {% if request.form.get('group') == 'premium' %}checked{% endif %}>
          <div class="d-flex align-items-center gap-3">
            <div class="tier-icon">⭐</div>
            <div>
              <div class="tier-name">Premium Guest</div>
              <div class="tier-desc">Enhanced access · loyalty &amp; packages · 16 hours</div>
            </div>
          </div>
        </label>
      </div>

      <div id="guest-fields">
        <div class="mb-3">
          <label class="form-label">Last Name</label>
          <input type="text" name="username" id="username" class="form-control"
                 placeholder="Enter your last name" autocomplete="family-name"
                 value="{{ request.form.get('username', '') }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Room Number</label>
          <input type="text" name="room" id="room" class="form-control"
                 placeholder="e.g. 412"
                 value="{{ request.form.get('room', '') }}">
        </div>
      </div>

      <div class="eula-row mb-2">
        <input type="checkbox" id="eula" name="eula">
        <label for="eula">
          I agree to the
          <a href="#" onclick="return false;">acceptable use policy</a>
          and understand that network activity may be monitored.
        </label>
      </div>

      <button type="submit" id="submit-btn"
              class="btn btn-connect btn-primary w-100 text-white" disabled>
        Connect to WiFi
      </button>

    </form>
  </div>

  <script>
    const eulaBox     = document.getElementById('eula');
    const submitBtn   = document.getElementById('submit-btn');
    const guestFields = document.getElementById('guest-fields');
    const usernameInput = document.getElementById('username');
    const roomInput   = document.getElementById('room');

    function syncTier() {
      const radios = document.querySelectorAll('input[name="group"]');
      let selected = 'public';
      radios.forEach(r => {
        r.closest('.tier-card').classList.toggle('selected', r.checked);
        if (r.checked) selected = r.value;
      });
      const needsRoom = (selected === 'free' || selected === 'premium');
      guestFields.classList.toggle('visible', needsRoom);
      usernameInput.required = needsRoom;
      roomInput.required     = needsRoom;
    }

    document.querySelectorAll('input[name="group"]').forEach(r => {
      r.addEventListener('change', syncTier);
    });

    eulaBox.addEventListener('change', () => {
      submitBtn.disabled = !eulaBox.checked;
    });

    syncTier();

    const eulaChecked = "{{ 'true' if request.form.get('eula') else 'false' }}";
    if (eulaChecked === 'true') {
      eulaBox.checked = true;
      submitBtn.disabled = false;
    }
  </script>
</body>
</html>
